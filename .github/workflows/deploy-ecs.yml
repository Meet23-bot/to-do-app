# Build Docker image, push to Amazon ECR, register ECS task definition, update ECS service.
# App lives under To-Do-List-Application/ — paths below must stay in sync with that folder.
# Setup: see To-Do-List-Application/docs/GITHUB_ACTIONS_SETUP.md (OIDC + repository variables + secrets).

name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy configuration (prints what GitHub sees)
        id: gate
        run: |
          set -euo pipefail
          echo "event=${{ github.event_name }}"
          echo "ECS_DEPLOY_ENABLED(raw)='${{ vars.ECS_DEPLOY_ENABLED }}'"
          echo "AWS_REGION(raw)='${{ vars.AWS_REGION }}'"
          echo "ECR_REPOSITORY(raw)='${{ vars.ECR_REPOSITORY }}'"
          echo "ECS_CLUSTER(raw)='${{ vars.ECS_CLUSTER }}'"
          echo "ECS_SERVICE(raw)='${{ vars.ECS_SERVICE }}'"

          ECS_DEPLOY_ENABLED_TRIMMED="$(echo -n "${{ vars.ECS_DEPLOY_ENABLED }}" | tr -d '\r' | xargs)"
          AWS_REGION_TRIMMED="$(echo -n "${{ vars.AWS_REGION }}" | tr -d '\r' | xargs)"
          ECR_REPOSITORY_TRIMMED="$(echo -n "${{ vars.ECR_REPOSITORY }}" | tr -d '\r' | xargs)"
          ECS_CLUSTER_TRIMMED="$(echo -n "${{ vars.ECS_CLUSTER }}" | tr -d '\r' | xargs)"
          ECS_SERVICE_TRIMMED="$(echo -n "${{ vars.ECS_SERVICE }}" | tr -d '\r' | xargs)"

          echo "ECS_DEPLOY_ENABLED(trimmed)='${ECS_DEPLOY_ENABLED_TRIMMED}'"
          echo "AWS_REGION(trimmed)='${AWS_REGION_TRIMMED}'"
          echo "ECR_REPOSITORY(trimmed)='${ECR_REPOSITORY_TRIMMED}'"
          echo "ECS_CLUSTER(trimmed)='${ECS_CLUSTER_TRIMMED}'"
          echo "ECS_SERVICE(trimmed)='${ECS_SERVICE_TRIMMED}'"

          ok=true
          if [ "${ECS_DEPLOY_ENABLED_TRIMMED}" != "true" ]; then
            echo "::error::ECS_DEPLOY_ENABLED must be true after trimming spaces (got: '${ECS_DEPLOY_ENABLED_TRIMMED}')."
            ok=false
          fi
          if [ -z "${AWS_REGION_TRIMMED}" ]; then
            echo "::error::Missing repository variable AWS_REGION"
            ok=false
          fi
          if [ -z "${ECR_REPOSITORY_TRIMMED}" ]; then
            echo "::error::Missing repository variable ECR_REPOSITORY"
            ok=false
          fi
          if [ -z "${ECS_CLUSTER_TRIMMED}" ]; then
            echo "::error::Missing repository variable ECS_CLUSTER"
            ok=false
          fi
          if [ -z "${ECS_SERVICE_TRIMMED}" ]; then
            echo "::error::Missing repository variable ECS_SERVICE"
            ok=false
          fi

          if [ "$ok" != "true" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              exit 1
            fi
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deploy=true" >> "$GITHUB_OUTPUT"
          echo "aws_region=${AWS_REGION_TRIMMED}" >> "$GITHUB_OUTPUT"
          echo "ecr_repository=${ECR_REPOSITORY_TRIMMED}" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=${ECS_CLUSTER_TRIMMED}" >> "$GITHUB_OUTPUT"
          echo "ecs_service=${ECS_SERVICE_TRIMMED}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        if: steps.gate.outputs.deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ steps.gate.outputs.aws_region }}

      - name: Login to Amazon ECR
        if: steps.gate.outputs.deploy == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        if: steps.gate.outputs.deploy == 'true'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ steps.gate.outputs.ecr_repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" ./To-Do-List-Application
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          echo "IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Render ECS task definition
        if: steps.gate.outputs.deploy == 'true'
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ steps.gate.outputs.aws_region }}
          ECR_REPOSITORY: ${{ steps.gate.outputs.ecr_repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          AWS_ACCOUNT_ID="$(echo -n "${AWS_ACCOUNT_ID}" | tr -d '\r' | xargs)"
          AWS_REGION="$(echo -n "${AWS_REGION}" | tr -d '\r' | xargs)"
          ECR_REPOSITORY="$(echo -n "${ECR_REPOSITORY}" | tr -d '\r' | xargs)"
          sed -e "s/<ACCOUNT_ID>/${AWS_ACCOUNT_ID}/g" \
              -e "s/<REGION>/${AWS_REGION}/g" \
              -e "s/<ECR_REPOSITORY>/${ECR_REPOSITORY}/g" \
              -e "s/<IMAGE_TAG>/${IMAGE_TAG}/g" \
              To-Do-List-Application/aws/ecs-task-definition.template.json > taskdef.json
          echo "--- taskdef (image line only) ---"
          grep '"image"' taskdef.json || true

      - name: Register task definition
        if: steps.gate.outputs.deploy == 'true'
        id: register
        run: |
          ARN=$(aws ecs register-task-definition --cli-input-json file://taskdef.json --query taskDefinition.taskDefinitionArn --output text)
          echo "task_definition_arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        if: steps.gate.outputs.deploy == 'true'
        run: |
          aws ecs update-service \
            --cluster "${{ steps.gate.outputs.ecs_cluster }}" \
            --service "${{ steps.gate.outputs.ecs_service }}" \
            --task-definition "${{ steps.register.outputs.task_definition_arn }}" \
            --force-new-deployment
