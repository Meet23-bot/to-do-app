# Build Docker image, push to Amazon ECR, register ECS task definition, update ECS service.
# App lives under To-Do-List-Application/ — paths below must stay in sync with that folder.
# Setup: see To-Do-List-Application/docs/GITHUB_ACTIONS_SETUP.md (OIDC + repository variables + secrets).

name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy configuration (prints what GitHub sees)
        id: gate
        run: |
          set -euo pipefail
          echo "event=${{ github.event_name }}"
          echo "ECS_DEPLOY_ENABLED='${{ vars.ECS_DEPLOY_ENABLED }}'"
          echo "AWS_REGION='${{ vars.AWS_REGION }}'"
          echo "ECR_REPOSITORY='${{ vars.ECR_REPOSITORY }}'"
          echo "ECS_CLUSTER='${{ vars.ECS_CLUSTER }}'"
          echo "ECS_SERVICE='${{ vars.ECS_SERVICE }}'"

          ok=true
          if [ "${{ vars.ECS_DEPLOY_ENABLED }}" != "true" ]; then
            echo "::error::ECS_DEPLOY_ENABLED must be exactly the string true (no spaces, correct case). Current value shown above."
            ok=false
          fi
          if [ -z "${{ vars.AWS_REGION }}" ]; then
            echo "::error::Missing repository variable AWS_REGION"
            ok=false
          fi
          if [ -z "${{ vars.ECR_REPOSITORY }}" ]; then
            echo "::error::Missing repository variable ECR_REPOSITORY"
            ok=false
          fi
          if [ -z "${{ vars.ECS_CLUSTER }}" ]; then
            echo "::error::Missing repository variable ECS_CLUSTER"
            ok=false
          fi
          if [ -z "${{ vars.ECS_SERVICE }}" ]; then
            echo "::error::Missing repository variable ECS_SERVICE"
            ok=false
          fi

          if [ "$ok" != "true" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              exit 1
            fi
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        if: steps.gate.outputs.deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.gate.outputs.deploy == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        if: steps.gate.outputs.deploy == 'true'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" ./To-Do-List-Application
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          echo "IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Render ECS task definition
        if: steps.gate.outputs.deploy == 'true'
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -e "s/<ACCOUNT_ID>/${AWS_ACCOUNT_ID}/g" \
              -e "s/<REGION>/${AWS_REGION}/g" \
              -e "s/<ECR_REPOSITORY>/${ECR_REPOSITORY}/g" \
              -e "s/<IMAGE_TAG>/${IMAGE_TAG}/g" \
              To-Do-List-Application/aws/ecs-task-definition.template.json > taskdef.json
          echo "--- taskdef (image line only) ---"
          grep '"image"' taskdef.json || true

      - name: Register task definition
        if: steps.gate.outputs.deploy == 'true'
        id: register
        run: |
          ARN=$(aws ecs register-task-definition --cli-input-json file://taskdef.json --query taskDefinition.taskDefinitionArn --output text)
          echo "task_definition_arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        if: steps.gate.outputs.deploy == 'true'
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "${{ steps.register.outputs.task_definition_arn }}" \
            --force-new-deployment
